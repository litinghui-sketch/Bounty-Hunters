name: Backfill - Enforce Single Issue on Existing PRs

on:
  workflow_dispatch:

permissions:
  pull-requests: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Check all open PRs for multiple issue references
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            console.log(`Found ${prs.length} open PRs`);

            const pattern = /(?:(?:[\w.-]+\/[\w.-]+)?#(\d+))|(?:GH-(\d+))|(?:github\.com\/[\w.-]+\/[\w.-]+\/issues\/(\d+))/gi;

            for (const pr of prs) {
              const body = (pr.body || '') + ' ' + (pr.title || '');
              const matches = [...body.matchAll(pattern)];
              const issues = [...new Set(matches.map(m => m[1] || m[2] || m[3]))];

              if (issues.length > 1) {
                console.log(`PR #${pr.number} references ${issues.length} issues: ${issues.join(', ')}`);

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: `⚠️ **This PR references multiple issues (#${issues.join(', #')}).** Each pull request must address exactly one issue. Please split your changes into separate PRs — one per issue.\n\nSee [CONTRIBUTING.md](https://github.com/UnsafeLabs/Bounty-Hunters/blob/main/CONTRIBUTING.md) for details.`
                });

                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  state: 'closed'
                });

                console.log(`Closed PR #${pr.number}`);
              }
            }

            console.log('Backfill complete');
